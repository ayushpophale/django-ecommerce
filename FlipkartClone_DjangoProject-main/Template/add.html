<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Add Product</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="file"] {
            padding: 5px;
        }

        .btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Add Product</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- ID -->
            <label>ID</label>
            <input type="number" name="ID" required>

            <!-- Name -->
            <label>Name</label>
            <input type="text" name="name" required>

            <!-- Category -->
            <label>Category</label>
            <input type="text" name="category" required>

            <!-- Brand (for search_fields) -->
            <label>Brand</label>
            <input type="text" name="brand">

            <!-- Description -->
            <label>Description</label>
            <textarea name="description" rows="3"></textarea>

            <!-- Price -->
            <label>Price</label>
            <input type="number" name="price" step="0.01" required>

            <!-- Image -->
            <label>Image</label>
            <input type="file" name="image">

            <!-- PDF -->
            <label>PDF File</label>
            <input type="file" name="pdfs">

            <button type="submit" class="btn">Add Product</button>
        </form>
    </div>

</body>

</html>
